<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Z Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <h1>Z Dashboard</h1>
  <section id="cards">
    <div class="card"><div class="k">Trades</div><div id="k_trades">0</div></div>
    <div class="card"><div class="k">Win %</div><div id="k_win">0</div></div>
    <div class="card"><div class="k">PnL</div><div id="k_pnl">0</div></div>
    <div class="card"><div class="k">620d</div><div id="k_620">-</div></div>
  </section>

  <h3>Monthly PnL</h3>
  <canvas id="pnlChart"></canvas>

  <h3>Win rate by symbol (top)</h3>
  <canvas id="symChart"></canvas>

  <h3>Win rate by strategy</h3>
  <canvas id="strChart"></canvas>

  <h3>Long / Short win rate</h3>
  <canvas id="lsChart"></canvas>

  <h3>Alt Scanner 24h</h3>
  <table id="scan"><thead><tr><th>Symbol</th><th>Δ24h %</th><th>Vol24</th></tr></thead><tbody></tbody></table>

  <script src="/static/dashboard.js"></script>
</body>
</html>
