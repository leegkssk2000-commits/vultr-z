<!doctype html><html><head><meta charset="utf-8"><title>Z Dash</title>
<link rel="stylesheet" href="/static/dashboard.css"></head>
<body><h1>Z Dashboard</h1>
<div id="stat"></div><script src="/static/dashboard.js"></script></body></html>
h2{margin:0 0 12px} pre{background:#000;padding:12px;overflow:auto}
table{border-collapse:collapse;width:100%;margin:12px 0} th,td{border:1px solid #444;padding:6px 8px}</style>
<h2>Z Dashboard</h2>
<div id="health"></div>

<h3>Metrics</h3>
<table id="m"><thead><tr><th>ts</th><th>key</th><th>value</th></tr></thead><tbody></tbody></table>

<h3>Recent Trades</h3>
<table id="t"><thead><tr><th>ts</th><th>symbol</th><th>side</th><th>qty</th><th>price</th><th>pnl</th></tr></thead><tbody></tbody></table>

<script>
async function load(){
  const h=await fetch('/health').then(r=>r.json()); 
  document.getElementById('health').innerHTML = `<pre>${JSON.stringify(h,null,2)}</pre>`;
  const ms=await fetch('/metrics').then(r=>r.json());
  const mt=document.querySelector('#m tbody'); mt.innerHTML='';
  ms.forEach(r=>mt.insertAdjacentHTML('beforeend', `<tr><td>${r.ts}</td><td>${r.key}</td><td>${r.value}</td></tr>`));
  const ts=await fetch('/trades').then(r=>r.json());
  const tt=document.querySelector('#t tbody'); tt.innerHTML='';
  ts.forEach(r=>tt.insertAdjacentHTML('beforeend', `<tr><td>${r.ts}</td><td>${r.symbol}</td><td>${r.side}</td><td>${r.qty}</td><td>${r.price}</td><td>${r.pnl}</td></tr>`));
}
load(); setInterval(load, 10000);
</script>
